<!DOCTYPE html>
<html>
<head>
    <title>SmartPass AI</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
            background: #2d6cdf;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #1b4fb3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            white-space: pre-wrap;
            border-radius: 5px;
        }

        .title {
            text-align: center;
        }
    </style>
</head>

<body>

    <h2 class="title">SmartPass AI Validator</h2>

    <p style="color: gray; text-align:center;">
        AI-powered request analysis system (Backend + Frontend demo)
    </p>

    <textarea id="inputText" placeholder="Enter request..."></textarea>
    <br>

    <button onclick="analyze()">Analyze</button>

    <div class="result" id="result"></div>

    <script>
        async function analyze() {
            const API_URL = "https://smartpass-production-dc1d.up.railway.app/";

            const text = document.getElementById("inputText").value;

            if (!text) {
                document.getElementById("result").innerText = "Please enter a request first.";
                return;
            }

            document.getElementById("result").innerText = "Analyzing...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                document.getElementById("result").innerText =
                    JSON.stringify(data, null, 2);

            } catch (error) {
                document.getElementById("result").innerText =
                    "Error connecting to backend. Check API URL.";
            }
        }
    </script>

</body>
</html>
